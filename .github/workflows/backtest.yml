name: tests + backtest

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest -q
      - name: Backtest leaderboard
        # Backtests every example signal end-to-end and prints a ranked
        # leaderboard — proves the evaluate -> discretize -> run path works and
        # gives every PR an objective metrics readout (incl. any newly submitted
        # strategy) directly in the logs.
        run: PYTHONPATH=. python scripts/backtest_signals.py
