name: tests + backtest

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest -q
      - name: Backtest smoke-run
        # Runs a real end-to-end backtest on synthetic data — proves the
        # evaluate -> run path works and gives every PR an objective metrics
        # readout in the logs. Extend this to score submitted strategies.
        run: PYTHONPATH=. python examples/quickstart.py
